[project]
repo        = "CarlosDanielDev/wpp-tui"
base_branch = "main"

[sessions]
max_concurrent = 2
default_model  = "opus"
default_mode   = "orchestrator"

[provider]
kind = "github"
issue_filter_labels = ["maestro:ready"]
auto_pr = true
auto_merge = false
merge_method = "squash"

[github]
auto_pr = true
